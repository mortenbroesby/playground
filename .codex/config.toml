[mcp_servers.obsidian-memory]
command = "node"
args = ["tools/obsidian-memory/src/rag-mcp-server.mjs"]
cwd = "."
enabled_tools = [
  "memory_context",
  "memory_search",
  "memory_unfold",
]

[mcp_servers.obsidian-memory.tools.memory_context]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_search]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_unfold]
approval_mode = "approve"

[mcp_servers."ai-context-engine"]
command = "node"
args = [
  "tools/ai-context-engine/scripts/ai-context-engine.mjs",
  "mcp",
]
cwd = "."
enabled_tools = [
  "index_folder",
  "index_file",
  "get_file_outline",
  "get_file_tree",
  "get_repo_outline",
  "suggest_initial_queries",
  "query_code",
  "diagnostics",
]

[mcp_servers."ai-context-engine".tools.index_folder]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.index_file]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.get_file_outline]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.get_file_tree]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.get_repo_outline]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.suggest_initial_queries]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.query_code]
approval_mode = "approve"

[mcp_servers."ai-context-engine".tools.diagnostics]
approval_mode = "approve"

[features]
codex_hooks = true
