[mcp_servers.obsidian-memory]
command = "node"
args = ["tools/obsidian-memory/src/rag-mcp-server.mjs"]
cwd = "."
enabled_tools = [
  "memory_context",
  "memory_search",
  "memory_unfold",
]

[mcp_servers.obsidian-memory.tools.memory_context]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_search]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_unfold]
approval_mode = "approve"

[mcp_servers.astrograph]
command = "pnpm"
args = [
  "exec",
  "astrograph",
  "mcp",
]
cwd = "."
startup_timeout_sec = 90
enabled_tools = [
  "index_folder",
  "index_file",
  "get_file_outline",
  "get_file_tree",
  "get_repo_outline",
  "suggest_initial_queries",
  "query_code",
  "diagnostics",
]

[mcp_servers.astrograph.tools.index_folder]
approval_mode = "approve"

[mcp_servers.astrograph.tools.index_file]
approval_mode = "approve"

[mcp_servers.astrograph.tools.get_file_outline]
approval_mode = "approve"

[mcp_servers.astrograph.tools.get_file_tree]
approval_mode = "approve"

[mcp_servers.astrograph.tools.get_repo_outline]
approval_mode = "approve"

[mcp_servers.astrograph.tools.suggest_initial_queries]
approval_mode = "approve"

[mcp_servers.astrograph.tools.query_code]
approval_mode = "approve"

[mcp_servers.astrograph.tools.diagnostics]
approval_mode = "approve"

[mcp_servers.jcodemunch]
command = "jcodemunch-mcp"
args = [
  "serve",
  "--transport",
  "stdio",
  "--watcher",
  "--watcher-path",
  ".",
  "--watcher-extra-ignore",
  "README.md",
  "vault/",
  "plugins/",
  "docs/superpowers/",
  ".rag/",
  "dist/",
  ".next/",
  ".turbo/",
  "coverage/",
]
cwd = "."
startup_timeout_sec = 30
enabled_tools = [
  "get_file_outline",
  "get_file_content",
  "get_file_tree",
  "plan_turn",
  "register_edit",
  "resolve_repo",
  "get_repo_outline",
  "search_symbols",
  "get_context_bundle",
  "get_symbol_source",
  "search_text",
]

[mcp_servers.jcodemunch.tools.get_file_outline]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_content]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_tree]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.plan_turn]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.register_edit]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.resolve_repo]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_repo_outline]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.search_symbols]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_context_bundle]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_symbol_source]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.search_text]
approval_mode = "approve"

[features]
codex_hooks = true
