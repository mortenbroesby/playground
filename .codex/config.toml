[mcp_servers.obsidian-memory]
command = "node"
args = ["tools/obsidian-memory/src/rag-mcp-server.mjs"]
cwd = "."
enabled_tools = [
  "memory_context",
  "memory_search",
  "memory_unfold",
]

[mcp_servers.obsidian-memory.tools.memory_context]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_search]
approval_mode = "approve"

[mcp_servers.obsidian-memory.tools.memory_unfold]
approval_mode = "approve"

[mcp_servers.jcodemunch]
command = "jcodemunch-mcp"
args = [
  "serve",
  "--transport",
  "stdio",
  "--watcher",
  "--watcher-path",
  ".",
  "--watcher-extra-ignore",
  "README.md",
  "vault/",
  "docs/superpowers/",
  ".rag/",
  "dist/",
  ".next/",
  ".turbo/",
  "coverage/",
]
cwd = "."
enabled_tools = [
  "get_context_bundle",
  "get_file_content",
  "get_file_outline",
  "get_file_tree",
  "get_repo_outline",
  "get_symbol_source",
  "plan_turn",
  "register_edit",
  "resolve_repo",
  "search_symbols",
  "search_text",
]

[mcp_servers.jcodemunch.tools.get_context_bundle]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_content]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_outline]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_tree]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_repo_outline]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_symbol_source]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.plan_turn]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.register_edit]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.resolve_repo]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.search_symbols]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.search_text]
approval_mode = "approve"

[features]
codex_hooks = true
